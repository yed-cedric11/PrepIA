<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bienvenue sur PrepIA !</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --ink: #0d0d0d;
      --cream: #f5f0e8;
      --gold: #c9a84c;
      --gold-light: #e8d49a;
      --muted: #7a7067;
      --border: #e2d9c8;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--cream);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .card {
      background: white;
      border-radius: 28px;
      padding: 64px 48px;
      max-width: 480px;
      border: 1.5px solid var(--border);
      animation: fadeUp 0.6s ease both;
    }
    .check {
      width: 72px; height: 72px;
      background: var(--gold-light);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem;
      margin: 0 auto 28px;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 900;
      margin-bottom: 16px;
      color: var(--ink);
    }
    p {
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 32px;
      font-size: 0.95rem;
    }
    .code-box {
      background: var(--cream);
      border: 1.5px solid var(--gold);
      border-radius: 14px;
      padding: 16px 24px;
      margin-bottom: 32px;
    }
    .code-label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .code-value {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--ink);
      letter-spacing: 0.1em;
    }
    .btn {
      display: inline-block;
      background: var(--ink);
      color: var(--cream);
      padding: 14px 32px;
      border-radius: 100px;
      font-size: 0.95rem;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.2s;
    }
    .btn:hover { background: var(--gold); color: var(--ink); }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="check">✦</div>
    <h1>Bienvenue sur PrepIA !</h1>
    <p>Ton abonnement est confirmé. Utilise le code ci-dessous pour accéder à tous les outils et générer tes documents illimités.</p>
    
    <div class="code-box">
      <div class="code-label">Ton code d'accès</div>
      <div class="code-value">prepia2024</div>
    </div>

    <a href="/" class="btn">Accéder à PrepIA →</a>
  </div>
</body>
</html>
