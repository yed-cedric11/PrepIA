<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bienvenue sur PrepIA !</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --ink: #0d0d0d;
      --cream: #f5f0e8;
      --gold: #c9a84c;
      --gold-light: #e8d49a;
      --muted: #7a7067;
      --border: #e2d9c8;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--cream);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: white;
      border-radius: 28px;
      padding: 64px 48px;
      max-width: 480px;
      width: 100%;
      border: 1.5px solid var(--border);
      text-align: center;
      animation: fadeUp 0.6s ease both;
    }
    .check {
      width: 72px; height: 72px;
      background: var(--gold-light);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem;
      margin: 0 auto 28px;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 900;
      margin-bottom: 16px;
      color: var(--ink);
    }
    p {
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 32px;
      font-size: 0.95rem;
    }
    .btn {
      display: inline-block;
      width: 100%;
      background: var(--ink);
      color: var(--cream);
      padding: 16px 32px;
      border-radius: 14px;
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.2s;
      cursor: pointer;
      border: none;
      font-family: 'DM Sans', sans-serif;
    }
    .btn:hover { background: var(--gold); color: var(--ink); }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="check">✦</div>
    <h1>Bienvenue sur PrepIA !</h1>
    <p>Ton abonnement est confirmé. Clique sur le bouton ci-dessous pour accéder à tous les outils et générer tes documents en illimité.</p>
    <button class="btn" onclick="unlock()">Accéder à PrepIA →</button>
  </div>

  <script>
    function unlock() {
      // Débloquer l'accès illimité
      localStorage.setItem('prepia_access', 'prepia2024');
      // Rediriger vers le site
      window.location.href = '/';
    }
  </script>
</body>
</html>
